name: Deploy

on:
  workflow_dispatch:  # solo se ejecuta cuando tú lo disparas manualmente.

jobs:
  deploy:
    runs-on: [vm, docker, linux, amd64]
    container:
      image: node:22-bookworm

    steps:
      - name: Install Docker CLI
        run: |
          apt-get update -qq
          apt-get install -y -qq docker.io

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set deploy vars
        run: |
          APP_NAME=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')
          COMMIT=$(git rev-parse --short HEAD)
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV
          echo "COMMIT=${COMMIT}"     >> $GITHUB_ENV
          echo "DEPLOY_PORT=${{ vars.DEPLOY_PORT }}" >> $GITHUB_ENV

      - name: Check if already deployed
        id: check
        run: |
          RUNNING=$(docker ps --filter "name=^${APP_NAME}$" --format "{{.Image}}" 2>/dev/null || true)
          if [ "$RUNNING" = "${APP_NAME}:${COMMIT}" ]; then
            echo "already_deployed=true" >> $GITHUB_OUTPUT
            echo "Ya en producción: ${APP_NAME}:${COMMIT}, saltando deploy."
          else
            echo "already_deployed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build image
        if: steps.check.outputs.already_deployed == 'false'
        run: docker build -t ${APP_NAME}:${COMMIT} .

      - name: Deploy
        if: steps.check.outputs.already_deployed == 'false'
        run: |
          docker rm -f ${APP_NAME} 2>/dev/null || true
          docker run -d --restart unless-stopped \
            --name ${APP_NAME} \
            -p ${DEPLOY_PORT}:8080 \
            ${APP_NAME}:${COMMIT}

      - name: Cleanup old images
        if: steps.check.outputs.already_deployed == 'false'
        run: |
          docker images --format "{{.Repository}}:{{.Tag}} {{.ID}}" \
            | grep "^${APP_NAME}:" \
            | grep -v ":${COMMIT} " \
            | awk '{print $2}' \
            | xargs -r docker rmi -f || true
